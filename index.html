<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORE_STACK</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black">

  <!-- Pantalla inicial -->
  <div id="start-overlay" class="overlay">
    <div class="text-center">
      <h1 class="protocol-title mb-3">CORE_STACK</h1>
      <button class="btn-start-system" onclick="startGame()">INICIAR SISTEMA</button>
      <p class="mt-4 text-secondary">CONTROL: TECLADO O PANEL TÁCTIL</p>
    </div>
  </div>

  <!-- Modal Game Over -->
  <div id="game-over-modal" class="overlay" style="display: none;">
    <div class="game-over-box">
      <h2 class="text-danger mb-2" style="text-shadow: 0 0 10px #ff0044;">SISTEMA_CRÍTICO</h2>
      <h1 class="display-4 fw-bold mb-4">GAME OVER</h1>
      <div class="mb-4">
        <span class="label-tech d-block mb-1">PUNTAJE FINAL</span>
        <div id="final-score" class="value-tech text-info" style="font-size: 3.5rem;">0</div>
      </div>
      <button class="btn-start-system w-100" onclick="location.reload()">REINICIAR SISTEMA</button>
    </div>
  </div>

  <!-- Layout principal -->
  <div class="container-fluid main-wrapper">
    <div class="game-layout row">

      <!-- Panel de control -->
      <div class="side-panel-container col-md-3 order-2 order-md-1">
        <div class="side-panel compact p-3">
          <h6 class="label-tech mb-3">SISTEMA_CTRL</h6>
          <div class="control-grid">
            <button class="btn-neon cyan" onclick="control('UP')"><i class="bi bi-arrow-clockwise"></i></button>
            <button class="btn-neon cyan" onclick="control('Z')"><i class="bi bi-arrow-counterclockwise"></i></button>
            <button class="btn-neon purple" onclick="control('LEFT')"><i class="bi bi-caret-left-fill"></i></button>
            <button class="btn-neon purple" onclick="control('RIGHT')"><i class="bi bi-caret-right-fill"></i></button>
            <button class="btn-neon purple" onclick="control('DOWN')"><i class="bi bi-caret-down-fill"></i></button>
            <button class="btn-neon btn-drop" onclick="control('SPACE')">CAÍDA RÁPIDA</button>
          </div>
        </div>
      </div>

      <!-- Tablero -->
      <div class="board-container col-md-6 order-1 order-md-2">
        <div class="main-frame">
          <div id="tetris-grid" class="game-board"></div>
        </div>
      </div>

      <!-- Panel de estadísticas -->
      <div class="side-panel-container col-md-3 order-3">
        <div class="side-panel compact p-3">
          <div class="stat-box mb-4">
            <h6 class="label-tech">PUNTOS</h6>
            <div id="score" class="value-tech text-info">0</div>
          </div>
          <div class="stat-box mb-4">
            <h6 class="label-tech">NIVEL</h6>
            <div id="level" class="value-tech text-warning">1</div>
          </div>
          <div class="stat-box">
            <h6 class="label-tech">PRÓXIMA</h6>
            <div class="next-preview-container mt-2">
              <div id="next-grid" class="next-grid"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
